name: Build & Publish PDF to GitHub Pages

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v4
        with:
          root_file: tex_source/main.tex
          work_in_root_file_dir: true
          latexmk_use_lualatex: true

      - name: Prepare site for Pages
        run: |
          mkdir -p site
          cp tex_source/main.pdf site/main.pdf
          cat > site/index.html << 'EOF'
          <!doctype html>
          <meta charset="utf-8">
          <title>PDF</title>
          <h1>PDF</h1>
          <p><a href="./main.pdf">Open main.pdf</a></p>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
