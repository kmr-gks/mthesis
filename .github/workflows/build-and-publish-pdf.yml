name: Build & Publish PDF to GitHub Pages

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  ROOT_TEX: main.tex

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install TeX Live + latexmk (with pLaTeX)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
          texlive-lang-japanese \
          texlive-latex-base texlive-latex-recommended texlive-latex-extra \
          latexmk

      - name: Compile LaTeX (pLaTeX -> dvipdfmx)
        run: |
          cd tex_source
          latexmk -pdfdvi -interaction=nonstopmode -halt-on-error main.tex

      - name: Upload PDF file
        uses: actions/upload-artifact@v6
        with:
          name: PDF
          path: tex_source/main.pdf

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
